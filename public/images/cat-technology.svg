<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
    <defs>
      <linearGradient id="grad-cat-technology.svg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
      </linearGradient>
      <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.15"/>
      </filter>
    </defs>
    <rect width="800" height="800" fill="url(#grad-cat-technology.svg)" />
    <g transform="translate(100, 100)" filter="url(#shadow)">
      <rect width="600" height="600" rx="30" fill="rgba(255, 255, 255, 0.08)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2"/>
    </g>
    <text x="50%" y="42%" dominant-baseline="middle" text-anchor="middle" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="120" font-weight="900" opacity="0.12">⌚</text>
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="36" font-weight="700" letter-spacing="1.5">TECNOLOGIA</text>
    <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" fill="rgba(255, 255, 255, 0.7)" font-family="'Outfit', sans-serif" font-size="18" font-weight="400" letter-spacing="3">PREMIUM COLLECTION</text>
  </svg>