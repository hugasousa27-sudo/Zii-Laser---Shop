<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
      <defs>
        <linearGradient id="grad-360-5-8" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:1" />
        </linearGradient>
      </defs>
      <rect width="800" height="800" fill="url(#grad-360-5-8)" />
      
      <!-- Rotating grid visualizer -->
      <circle cx="400" cy="400" r="300" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />
      <circle cx="400" cy="400" r="200" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.5" />
      <ellipse cx="400" cy="400" rx="300" ry="100" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" transform="rotate(315 400 400)" />
      
      <!-- 3D rotation frame text and indicators -->
      <g transform="translate(400, 400) rotate(315)">
        <rect x="-80" y="-80" width="160" height="160" rx="20" fill="rgba(255, 255, 255, 0.12)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="3" />
        <text x="0" y="10" dominant-baseline="middle" text-anchor="middle" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="48" font-weight="800">360°</text>
      </g>
      
      <text x="50%" y="15%" dominant-baseline="middle" text-anchor="middle" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" letter-spacing="1">TECLADO</text>
      <text x="50%" y="85%" dominant-baseline="middle" text-anchor="middle" fill="rgba(255, 255, 255, 0.6)" font-family="'Outfit', sans-serif" font-size="18" font-weight="500">FRAME 8 / 8 (DRAG TO ROTATE)</text>
    </svg>